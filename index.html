<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLX Multi-Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-api.js"></script>
    <style>
        :root {
            --bg-color: #0b1426;
            --card-bg: #152238;
            --primary-color: #007bff;
            --text-color: #ffffff;
            --accent-color: #28a745;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 20px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 32px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #23395b;
            border-radius: 12px;
            background-color: #0b1426;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--primary-color);
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0056b3, #007bff);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #b0c4de;
        }
        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 320px;
            width: 90%;
            text-align: center;
        }
        .modal-btn {
            background: var(--accent-color);
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="logo">⚡</div>
            <h2 style="margin: 10px 0 5px 0;">DLX Downloader</h2>
            <p style="color: #8a9bb4; font-size: 14px; margin: 0 0 20px 0;">Download Without Watermark</p>
        </div>

        <input type="text" id="linkInput" placeholder="Paste video link here...">
        <button id="actionBtn" onclick="handleDownload()">Analyze Link</button>
        <div class="status" id="statusText"></div>
    </div>

    <div class="modal" id="channelModal">
        <div class="modal-content">
            <h3>📢 Join Our Channel</h3>
            <p style="color: #b0c4de; font-size: 14px;">To support us and continue downloading unlimited videos, please join our updates channel.</p>
            <button onclick="goToChannel()">Join Channel</button>
            <button class="modal-btn" onclick="verifyJoin()">I Have Joined</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ⚠️ ማስተካከያ፦ እዚህ ጋር የራስህን መረጃዎች አስገባ
        const RENDER_SERVER = "https://dlx-downloader.onrender.com"; // የሬንደር ሊንክህ
        const TELEGRAM_CHANNEL = "https://t.me/hbeo11"; // የአንተ ቴሌግራም ቻናል ሊንክ
        const ADSGRAM_BLOCK_ID = "3366"; // የአድስግራም ብሎክ ID (ካልነበረህ 3366 ማሳያ ነው)

        let isSecondTime = localStorage.getItem("download_count") ? true : false;
        let hasJoined = localStorage.getItem("has_joined") === "true";

        // Adsgram ማስታወቂያ ማዘጋጃ
        const AdController = window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID });

        function handleDownload() {
            const url = document.getElementById("linkInput").value.trim();
            if (!url) {
                showStatus("Please paste a valid link!", "#ff4d4d");
                return;
            }

            // ለሁለተኛ ጊዜ የመጣ ከሆነና ቻናሉን ካልቀላቀለ መጀመሪያ ግዴታውን አሳይ
            if (isSecondTime && !hasJoined) {
                document.getElementById("channelModal").style.display = "flex";
                return;
            }

            // መጀመሪያ ማስታወቂያ አሳይ
            showStatus("Loading Ad...", "#ffc107");
            AdController.show().then((result) => {
                // ማስታወቂያው በተሳካ ሁኔታ ካለፈ ወደ ማውረድ ሂድ
                processVideoDownload(url);
            }).catch((err) => {
                // ማስታወቂያ ባይመጣም እንኳን ተጠቃሚው እንዳይሰለች ቀጥታ አውርድለት
                console.log("Ad skipped or error:", err);
                processVideoDownload(url);
            });
        }

        async function processVideoDownload(videoUrl) {
            const btn = document.getElementById("actionBtn");
            btn.disabled = true;
            showStatus("Analyzing video... Please wait (Server waking up)...", "#007bff");

            try {
                const response = await fetch(`${RENDER_SERVER}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: videoUrl })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus("Success! Downloading started...", "#28a745");
                    
                    // ተጠቃሚው ስሪቱን ለመጀመሪያ ጊዜ ማውረዱን መመዝገብ
                    localStorage.setItem("download_count", "1");
                    isSecondTime = true;

                    // ቪዲዮውን በቴሌግራም በኩል ማውረድ
                    tg.openLink(data.download_url);
                } else {
                    showStatus("Error: " + (data.error || "Unsupported link!"), "#ff4d4d");
                }
            } catch (error) {
                showStatus("Server response timeout! Try again in a few seconds.", "#ff4d4d");
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }

        function goToChannel() {
            tg.openTelegramLink(TELEGRAM_CHANNEL);
        }

        function verifyJoin() {
            localStorage.setItem("has_joined", "true");
            hasJoined = true;
            document.getElementById("channelModal").style.display = "none";
            showStatus("Thank you for joining! You can now download.", "#28a745");
        }

        function showStatus(text, color) {
            const el = document.getElementById("statusText");
            el.innerText = text;
            el.style.color = color;
        }
    </script>
</body>
</html>
