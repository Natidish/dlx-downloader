<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Media Downloader</title>
    <!-- Tailwind CSS ለሳቢ እና ዘመናዊ ዲዛይን -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram ስክሪፕት -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <!-- FontAwesome ለሚያምሩ አይኮኖች -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-white font-sans antialiased min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-[#1e293b] rounded-2xl p-6 shadow-2xl border border-[#334155]">
    
    <!-- Header -->
    <div class="text-center mb-6">
        <div class="inline-flex bg-blue-600/20 p-4 rounded-full text-blue-500 text-3xl mb-3 animate-bounce">
            <i class="fa-solid fa-cloud-arrow-down"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">ሚዲያ ማውረጃ ቦት</h1>
        <p class="text-gray-400 text-sm mt-1">ቲክቶክ እና ኢንስታግራም ቪዲዮዎችን ያለ ዋተርማርክ ያውርዱ</p>
    </div>

    <!-- ደረጃ 1፦ ቻናል ጆይን ማድረጊያ ሎክ -->
    <div id="joinLockSection" class="space-y-4 text-center">
        <div class="bg-amber-500/10 border border-amber-500/30 p-4 rounded-xl text-sm text-amber-400">
            <i class="fa-solid fa-circle-exclamation mr-2"></i> አፑን ለመጠቀም መጀመሪያ ቻናላችንን መቀላቀል አለብዎት!
        </div>
        <!-- ወደ ቻናልህ መውሰጃ ሊንክ -->
        <a href="https://t.me/your_channel_id" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200">
            <i class="fa-brands fa-telegram mr-2"></i> ቻናሉን ጆይን ያድርጉ
        </a>
        <button onclick="verifySubscription()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200">
            <i class="fa-solid fa-circle-check mr-2"></i> ጆይን ማድረጌን አረጋግጥ
        </button>
    </div>

    <!-- ደረጃ 2፦ ዋናው ሊንክ ማስገቢያ (መጀመሪያ ተደብቋል) -->
    <div id="mainAppSection" class="hidden space-y-4">
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-link"></i>
            </span>
            <input type="text" id="linkInput" placeholder="የቪዲዮውን ሊንክ እዚህ ያጥብቁ..." class="w-full pl-10 pr-4 py-3 bg-[#0f172a] border border-[#334155] rounded-xl focus:outline-none focus:border-blue-500 transition duration-200 text-sm text-white placeholder-gray-500">
        </div>
        
        <button onclick="processMedia()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition duration-200">
            ሊንኩን መርምር
        </button>

        <!-- Loading Loader -->
        <div id="loader" class="hidden text-center py-4 text-blue-400 text-sm font-medium">
            <i class="fa-solid fa-spinner animate-spin mr-2"></i> ሊንኩ እየተመረመረ ነው...
        </div>

        <!-- ደረጃ 3፦ የማውረጃ እና የሼር ዞን -->
        <div id="downloadZone" class="hidden bg-[#0f172a] p-4 rounded-xl border border-[#334155] space-y-4">
            <h4 id="mediaTitle" class="text-sm font-semibold text-gray-200 truncate"></h4>
            
            <!-- የሼር መከታተያ ባር -->
            <div class="space-y-1">
                <div class="flex justify-between text-xs text-gray-400">
                    <span>ለ 3 ጓደኛዎ ሼር ያድርጉ፦</span>
                    <span id="shareCountLabel">0 / 3</span>
                </div>
                <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
                    <div id="shareProgressBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>

            <!-- ሼር ማድረጊያ ቁልፍ -->
            <button onclick="shareWithFriends()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-4 rounded-lg text-sm transition">
                <i class="fa-solid fa-share-nodes mr-2"></i> ለጓደኛ ሼር አድርግ
            </button>

            <!-- የመጨረሻ ማውረጃ ቁልፍ (መጀመሪያ ይሰናከላል) -->
            <button id="realDownloadBtn" disabled class="w-full bg-gray-600 text-gray-400 font-bold py-3 px-4 rounded-xl text-center cursor-not-allowed">
                <i class="fa-solid fa-lock mr-2"></i> መጀመሪያ ሼር ያድርጉ
            </button>
        </div>
    </div>

</div>

<script>
    const WebApp = window.Telegram.WebApp;
    WebApp.ready();
    WebApp.expand();

    // ከቴሌግራም የተጠቃሚውን መረጃ ማግኘት
    const userId = WebApp.initDataUnsafe?.user?.id || "";
    // የአንተ የRender ሰርቨር አድራሻ
    const BACKEND_URL = "https://YOUR-RENDER-APP-NAME.onrender.com"; 
    // የ Adsgram Block ID
    const AdController = window.Adsgram.init({ blockId: "YOUR_ADSGRAM_BLOCK_ID" });

    let finalUrl = "";
    let shareCount = 0;

    // ገጹ ሲከፈት መጀመሪያ ጆይን ማድረጉን ቼክ ማድረግ
    async function verifySubscription() {
        if(!userId) {
            // በኮምፒውተር እየተሞከረ ከሆነ በቀጥታ ማሳለፍ
            showMainApp();
            return;
        }

        try {
            const res = await fetch(`${BACKEND_URL}/check-join`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: String(userId) })
            });
            const data = await res.json();
            if(data.is_joined) {
                showMainApp();
            } else {
                WebApp.showAlert("እባክዎ መጀመሪያ ቻናሉን ይቀላቀሉ!");
            }
        } catch (err) {
            showMainApp(); // ሰርቨር ከጠፋ እንዳይዘጋ
        }
    }

    function showMainApp() {
        document.getElementById('joinLockSection').classList.add('hidden');
        document.getElementById('mainAppSection').classList.remove('hidden');
    }

    async function processMedia() {
        const urlValue = document.getElementById('linkInput').value;
        if(!urlValue) return WebApp.showAlert("እባክዎ መጀመሪያ ሊንክ ያስገቡ!");

        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('downloadZone').classList.add('hidden');

        try {
            const res = await fetch(`${BACKEND_URL}/extract`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: urlValue })
            });
            const data = await res.json();
            document.getElementById('loader').classList.add('hidden');

            if(data.status === "success") {
                finalUrl = data.download_url;
                document.getElementById('mediaTitle').innerText = data.title;
                document.getElementById('downloadZone').classList.remove('hidden');
                
                // የሼር ሁኔታን ዜሮ ማድረግ
                shareCount = 0;
                updateShareUI();
            } else {
                WebApp.showAlert("ሊንኩን መስበር አልተቻለም!");
            }
        } catch (err) {
            document.getElementById('loader').classList.add('hidden');
            WebApp.showAlert("ከሰርቨር ጋር መገናኘት አልተቻለም!");
        }
    }

    function shareWithFriends() {
        // የቴሌግራም አብሮ የተሰራውን ሼር ማድረጊያ መጠቀም (የአፑን ሊንክ እዚህ ያስገባሉ)
        const appUrl = "https://t.me/YOUR_BOT_USERNAME/app_name"; 
        WebApp.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(appUrl)}&text=${encodeURIComponent("ይህንን ምርጥ ቪዲዮ ማውረጃ ቦት ተጠቀም!")}`);
        
        // ተጠቃሚው ወደ ሼር ገጽ ሄዶ ሲመለስ የሼር ብዛትን መቁጠር
        setTimeout(() => {
            if(shareCount < 3) {
                shareCount++;
                updateShareUI();
            }
        }, 2000);
    }

    function updateShareUI() {
        document.getElementById('shareCountLabel').innerText = `${shareCount} / 3`;
        const percent = (shareCount / 3) * 100;
        document.getElementById('shareProgressBar').style.width = `${percent}%`;

        const btn = document.getElementById('realDownloadBtn');
        if(shareCount >= 3) {
            btn.disabled = false;
            btn.className = "w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl text-center cursor-pointer shadow-lg transition";
            btn.innerHTML = "<i class='fa-solid fa-circle-down mr-2'></i> አሁን በነፃ አውርድ 🚀";
            btn.onclick = triggerAdAndDownload;
        } else {
            btn.disabled = true;
            btn.className = "w-full bg-gray-600 text-gray-400 font-bold py-3 px-4 rounded-xl text-center cursor-not-allowed";
            btn.innerHTML = `<i class='fa-solid fa-lock mr-2'></i> ቀሪ ${3 - shareCount} ሼር ያስፈልጋል`;
        }
    }

    function triggerAdAndDownload() {
        AdController.show().then(() => {
            window.location.href = finalUrl;
        }).catch(() => {
            window.location.href = finalUrl;
        });
    }
</script>

</body>
</html>
